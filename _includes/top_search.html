{% assign search_index = '/' | append: page.lang | append: '/search.json' | relative_url %}
<section class="top-search" aria-label="{% if page.lang == 'fr' %}Recherche{% else %}Search{% endif %}">
  <form class="docs-search" data-lang="{{ page.lang }}" data-search-index="{{ search_index }}" role="search" autocomplete="off">
    <label for="site-search" class="search-label">{% if page.lang == 'fr' %}Rechercher{% else %}Search{% endif %}</label>
    <input id="site-search" name="q" type="search" class="search-input" placeholder="{% if page.lang == 'fr' %}Chercher dans la documentation{% else %}Search documentation{% endif %}">
    <ul id="search-results" class="search-results"></ul>
  </form>
</section>
